apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/konflux-ci/tekton-integration-catalog?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "pull_request" && target_branch
      == "main" && ( "tasks/mapt-oci/kind-aws-spot/***".pathChanged()
      || ".tekton/mapt-provision-test-pull-request.yaml".pathChanged()
      )
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: mapt-provision-test
    appstudio.openshift.io/component: mapt-provision-test
    pipelines.appstudio.openshift.io/type: build
  name: mapt-provision-test-on-pull-request
  namespace: rh-konflux-devprod-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: cluster-id
    value: 'pr-{{pull_request_number}}-{{run_id}}'
  - name: mapt-arch
    value: 'x86_64'
  - name: mapt-cpus
    value: '1'
  - name: mapt-memory
    value: '1'
  - name: mapt-spot
    value: 'true'
  - name: mapt-spot-increase-rate
    value: '10'
  - name: mapt-timeout
    value: '15m'
  - name: aws-credentials-secret
    value: 'aws-credentials'
  - name: oci-credentials-secret
    value: 'konflux-test-infra'
  pipelineSpec:
    description: |
      This pipeline tests the mapt provision and deprovision tasks by creating a temporary Kind cluster on AWS
      and then cleaning it up. It validates the complete lifecycle of cluster provisioning using the Mapt CLI.
    params:
    - description: Source Repository URL
      name: git-url
      type: string
    - description: Revision of the Source Repository
      name: revision
      type: string
    - description: Unique identifier for the test cluster
      name: cluster-id
      type: string
    - description: Architecture for the Kind cluster (x86_64 or arm64)
      name: mapt-arch
      type: string
    - description: Number of vCPUs for the Kind cluster
      name: mapt-cpus
      type: string
    - description: Memory in GiB for the Kind cluster
      name: mapt-memory
      type: string
    - description: Use spot instances for cost optimization
      name: mapt-spot
      type: string
    - description: Spot price increase rate percentage
      name: mapt-spot-increase-rate
      type: string
    - description: Timeout for cluster operations
      name: mapt-timeout
      type: string
    - description: Kubernetes secret containing AWS credentials
      name: aws-credentials-secret
      type: string
    - description: Kubernetes secret containing OCI credentials
      name: oci-credentials-secret
      type: string
    workspaces:
    - name: source
      description: The workspace where the git repository will be cloned
    - name: git-auth
      optional: true
    tasks:
    - name: clone-repository
      params:
      - name: url
        value: $(params.git-url)
      - name: revision
        value: $(params.revision)
      taskSpec:
        params:
        - name: url
          type: string
        - name: revision
          type: string
        workspaces:
        - name: output
          description: The workspace where the git repository will be cloned
        steps:
        - name: clone
          image: alpine/git:latest
          script: |
            #!/bin/sh
            set -e
            
            echo "Cloning repository $(params.url) at revision $(params.revision)"
            git clone $(params.url) /source
            cd /source
            git checkout $(params.revision)
            echo "Clone completed successfully"
          env:
          - name: PARAM_URL
            value: $(params.url)
          - name: PARAM_REVISION
            value: $(params.revision)
          volumeMounts:
          - name: output
            mountPath: /source
        volumes:
        - name: output
          workspace:
            name: output
      workspaces:
      - name: output
        workspace: source
    - name: mapt-provision
      runAfter: ["clone-repository"]
      timeout: 25m
      params:
      - name: secret-aws-credentials
        value: $(params.aws-credentials-secret)
      - name: id
        value: $(params.cluster-id)
      - name: ownerName
        value: $(context.pipelineRun.name)
      - name: ownerUid
        value: $(context.pipelineRun.uid)
      - name: arch
        value: $(params.mapt-arch)
      - name: cpus
        value: $(params.mapt-cpus)
      - name: memory
        value: $(params.mapt-memory)
      - name: spot
        value: $(params.mapt-spot)
      - name: spot-increase-rate
        value: $(params.mapt-spot-increase-rate)
      - name: timeout
        value: $(params.mapt-timeout)
      - name: tags
        value: "created-by=tekton-pipeline,test-run=$(context.pipelineRun.name),pr=$(context.pipelineRun.labels['pipelinesascode.tekton.dev/pull-request'])"
      - name: oci-ref
        value: "not-used"
      - name: oci-credentials
        value: $(params.oci-credentials-secret)
      taskSpec:
        apiVersion: tekton.dev/v1
        kind: Task
        metadata:
          name: kind-aws-provision
          labels:
            app.kubernetes.io/version: "0.2"
          annotations:
            tekton.dev/pipelines.minVersion: "0.44.x"
            tekton.dev/categories: infrastructure
            tekton.dev/tags: infrastructure, aws, kind
            tekton.dev/displayName: "Kind Cloud Single Node - Create"
            tekton.dev/platforms: "linux/amd64, linux/arm64"
            mapt/version: "v0.9.5"
        spec:
          description: |
            Creates a single-node Kubernetes cluster using Kind on AWS, powered by the Mapt CLI.
            This task is ideal for setting up ephemeral clusters for testing or CI/CD workflows.

            It supports:
              - Spot instance provisioning and nested virtualization
              - Custom CPU, memory, and architecture configurations
              - Automatic cluster cleanup via timeout
              - Securely exposes the generated kubeconfig as a Kubernetes Secret
          volumes:
            - name: aws-credentials
              secret:
                secretName: $(params.secret-aws-credentials)
            - name: cluster-info
              emptyDir: {}
            - name: logs
              emptyDir: {}
            - name: konflux-test-infra-volume
              secret:
                secretName: $(params.oci-credentials)
          params:
            - name: secret-aws-credentials
              description: |
                K8S secret holding the aws credentials. Secret should be accessible to this task.
              type: string
            - name: id
              description: Unique identifier for the cluster
              type: string
            - name: ownerName
              description: Name of the owner for resource tagging
              type: string
            - name: ownerUid
              description: UID of the owner for resource tagging
              type: string
            - name: arch
              description: Architecture for the Kind cluster (x86_64 or arm64)
              type: string
            - name: cpus
              description: Number of vCPUs for the Kind cluster
              type: string
            - name: memory
              description: Memory in GiB for the Kind cluster
              type: string
            - name: spot
              description: Use spot instances for cost optimization
              type: string
            - name: spot-increase-rate
              description: Spot price increase rate percentage
              type: string
            - name: timeout
              description: Timeout for cluster operations
              type: string
            - name: tags
              description: Additional tags for AWS resources
              type: string
            - name: oci-ref
              description: OCI reference for the cluster
              type: string
            - name: oci-credentials
              description: Kubernetes secret containing OCI credentials
              type: string
          results:
            - name: cluster-access-secret
              description: Name of the secret containing cluster access information
            - name: cluster-name
              description: Name of the created cluster
            - name: cluster-endpoint
              description: Endpoint of the created cluster
          steps:
            - name: provision-cluster
              image: quay.io/konflux-ci/mapt:latest
              script: |
                #!/bin/bash
                set -e
                
                echo "Starting Kind cluster provisioning on AWS..."
                echo "Cluster ID: $(params.id)"
                echo "Architecture: $(params.arch)"
                echo "CPUs: $(params.cpus)"
                echo "Memory: $(params.memory)Gi"
                echo "Spot instances: $(params.spot)"
                
                # Set up AWS credentials
                export AWS_ACCESS_KEY_ID=$(cat /credentials/aws-credentials/access-key)
                export AWS_SECRET_ACCESS_KEY=$(cat /credentials/aws-credentials/secret-key)
                export AWS_DEFAULT_REGION=us-east-1
                
                # Create cluster using mapt
                mapt provision \
                  --id $(params.id) \
                  --arch $(params.arch) \
                  --cpus $(params.cpus) \
                  --memory $(params.memory) \
                  --spot $(params.spot) \
                  --spot-increase-rate $(params.spot-increase-rate) \
                  --timeout $(params.timeout) \
                  --tags "$(params.tags)" \
                  --output-dir /cluster-info
                
                echo "Cluster provisioning completed successfully"
              env:
                - name: PARAM_ID
                  value: $(params.id)
                - name: PARAM_ARCH
                  value: $(params.arch)
                - name: PARAM_CPUS
                  value: $(params.cpus)
                - name: PARAM_MEMORY
                  value: $(params.memory)
                - name: PARAM_SPOT
                  value: $(params.spot)
                - name: PARAM_SPOT_INCREASE_RATE
                  value: $(params.spot-increase-rate)
                - name: PARAM_TIMEOUT
                  value: $(params.timeout)
                - name: PARAM_TAGS
                  value: $(params.tags)
              volumeMounts:
                - name: aws-credentials
                  mountPath: /credentials/aws-credentials
                  readOnly: true
                - name: cluster-info
                  mountPath: /cluster-info
            - name: create-cluster-secret
              image: quay.io/konflux-ci/mapt:latest
              script: |
                #!/bin/bash
                set -e
                
                echo "Creating cluster access secret..."
                
                # Read cluster info and create secret
                CLUSTER_NAME=$(cat /cluster-info/cluster-name)
                KUBECONFIG=$(cat /cluster-info/kubeconfig)
                
                # Create secret with cluster access information
                kubectl create secret generic $(params.id)-cluster-access \
                  --from-literal=cluster-name="$CLUSTER_NAME" \
                  --from-literal=kubeconfig="$KUBECONFIG" \
                  --dry-run=client -o yaml > /cluster-info/cluster-secret.yaml
                
                echo "cluster-access-secret=$(params.id)-cluster-access" > $(results.cluster-access-secret.path)
                echo "cluster-name=$CLUSTER_NAME" > $(results.cluster-name.path)
                echo "cluster-endpoint=https://$(params.id).kind.local" > $(results.cluster-endpoint.path)
                
                echo "Cluster secret created successfully"
              volumeMounts:
                - name: cluster-info
                  mountPath: /cluster-info
    - name: validate-cluster
      runAfter: ["mapt-provision"]
      params:
      - name: args
        value:
        - "get"
        - "nodes"
        - "--kubeconfig=/credentials/kubeconfig"
      - name: script
        value: |
          #!/bin/bash
          set -e
          timeout 300s bash -c "while ! kubectl get nodes --kubeconfig=/credentials/kubeconfig >/dev/null 2>/dev/null; do printf '.'; sleep 10; done"
          kubectl get nodes --kubeconfig=/credentials/kubeconfig
          kubectl get pods --all-namespaces --kubeconfig=/credentials/kubeconfig
      taskRef:
        name: kubectl
        kind: ClusterTask
        apiVersion: tekton.dev/v1
      volumes:
      - name: credentials-volume
        secret:
          secretName: $(tasks.mapt-provision.results.cluster-access-secret)
      stepTemplate:
        env:
        - name: KUBECONFIG
          value: '/credentials/kubeconfig'
        volumeMounts:
        - name: credentials-volume
          mountPath: /credentials
    - name: mapt-deprovision
      runAfter: ["validate-cluster"]
      params:
      - name: secret-aws-credentials
        value: $(params.aws-credentials-secret)
      - name: id
        value: $(params.cluster-id)
      - name: cluster-access-secret
        value: $(tasks.mapt-provision.results.cluster-access-secret)
      - name: oci-container
        value: "not-used-in-successful-run"
      - name: oci-credentials
        value: $(params.oci-credentials-secret)
      - name: force-destroy
        value: "true"
      taskRef:
        resolver: git
        params:
        - name: url
          value: https://github.com/konflux-ci/tekton-integration-catalog
        - name: revision
          value: main
        - name: pathInRepo
          value: tasks/mapt-oci/kind-aws-spot/deprovision/0.1/kind-aws-deprovision.yaml
        apiVersion: tekton.dev/v1
        kind: Task
    finally:
    - name: cleanup-on-failure
      when:
      - input: $(tasks.mapt-deprovision.status)
        operator: notin
        values: ["Succeeded"]
      params:
      - name: secret-aws-credentials
        value: $(params.aws-credentials-secret)
      - name: id
        value: $(params.cluster-id)
      - name: cluster-access-secret
        value: $(tasks.mapt-provision.results.cluster-access-secret)
      - name: oci-container
        value: "cleanup-run"
      - name: oci-credentials
        value: $(params.oci-credentials-secret)
      - name: force-destroy
        value: "true"
      taskRef:
        resolver: git
        params:
        - name: url
          value: https://github.com/konflux-ci/tekton-integration-catalog
        - name: revision
          value: main
        - name: pathInRepo
          value: tasks/mapt-oci/kind-aws-spot/deprovision/0.1/kind-aws-deprovision.yaml
        apiVersion: tekton.dev/v1
        kind: Task
  taskRunTemplate:
    serviceAccountName: build-pipeline-tekton-integration-catalog-utils
  workspaces:
  - name: source
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
