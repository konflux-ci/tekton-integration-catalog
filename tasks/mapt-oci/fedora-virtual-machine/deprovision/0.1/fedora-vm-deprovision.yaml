---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: fedora-vm-deprovision
  labels:
    app.kubernetes.io/version: "0.1"
    upstream-usable: "true"
  annotations:
    tekton.dev/pipelines.minVersion: "0.44.x"
    tekton.dev/categories: infrastructure
    tekton.dev/tags: infrastructure, aws, fedora
    tekton.dev/displayName: "Destroy Fedora VM"
    mapt/version: "v1.0.0-dev"
spec:
  description: |
    Tears down a virtual machine that was previously provisioned on AWS using the Mapt CLI.
    This task is designed to safely and efficiently clean up virtual machines
    typically used in CI/CD pipelines or short-lived testing environments.

    It ensures the following:
    - Proper AWS credentials are used to authenticate the delete operation
    - Cleanup is scoped to a specific environment ID to avoid accidental deletions
    - Supports a `debug` mode to enable verbose output for troubleshooting. !!WARNING!! Using debug mode can expose credentials.

    Use this task in any workflow where you want to ensure that your test environments don't linger and incur unnecessary cloud costs.

  volumes:
    - name: aws-credentials
      secret:
        secretName: $(params.secret-aws-credentials)
    - name: host-info
      emptyDir: {}

  params:
    # input credentials
    - name: secret-aws-credentials
      description: |
        K8S secret holding the aws credentials. Secret should be accessible to this task.

        ---
        apiVersion: v1
        kind: Secret
        metadata:
          name: aws-${name}
        type: Opaque
        data:
          access-key: ${access_key}
          secret-key: ${secret_key}
          region: ${region}
          bucket: ${bucket}
    # mapt params
    - name: id
      description: identifier for the provisioned environment
    # control params
    - name: debug
      description: |
        Warning setting this param to true exposes partially masked credentials

        The parameter is intended to add verbosity on the task execution and also print masked credentials
        (showing first and last character with *** in the middle) on stdout to help with debugging
      default: "false"
    # cleanup params
    - name: force-destroy
      description: |
        If force-destroy is set the command will destroy even if there is a lock when is still provisioning a stack.
      default: "true"
  steps:
    - name: destroy
      image: quay.io/redhat-developer/mapt:v1.0.0-dev
      imagePullPolicy: Always
      env:
        - name: HOME
          value: /opt/mapt/run
      volumeMounts:
        - name: aws-credentials
          mountPath: /opt/aws-credentials
      script: |
        #!/bin/bash

        set -euo pipefail

        # Credentials - set these BEFORE enabling debug mode
        AWS_ACCESS_KEY_ID=$(cat /opt/aws-credentials/access-key)
        export AWS_ACCESS_KEY_ID
        AWS_SECRET_ACCESS_KEY=$(cat /opt/aws-credentials/secret-key)
        export AWS_SECRET_ACCESS_KEY
        AWS_DEFAULT_REGION=$(cat /opt/aws-credentials/region)
        export AWS_DEFAULT_REGION
        BUCKET=$(cat /opt/aws-credentials/bucket)

        # Run mapt
        cmd="mapt aws fedora destroy "
        cmd+="--project-name mapt-fedora-$(params.id) "
        cmd+="--backed-url s3://${BUCKET}/mapt/fedora/$(params.id) "

        if [[ $(params.debug) == "true" ]]; then
          cmd+="--debug "
          set -xeuo pipefail
        fi

        if [ "$(params.force-destroy)" = "true" ]; then
          cmd+="--force-destroy "
        fi

        eval "${cmd}"

      computeResources:
        requests:
          memory: "200Mi"
          cpu: "100m"
        limits:
          memory: "600Mi"
          cpu: "300m"
